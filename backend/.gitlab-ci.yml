# Backend Pipeline Stages
stages:
  - Lint
  - build
  - unit-test
  - coverage
  - submit-backend-executable

variables:
  GIT_STRATEGY: fetch
  GIT_CLEAN_FLAGS: -ffdx -e build/
  PATH_DEPLOY_BACKEND:  C:\Program Files\Backend Project Integration 4\ 

  
# Jobs Configuration
default:
  tags:
    - windows 
  before_script:
    - $env:PATH += ";$CI_PROJECT_DIR/build/vcpkg_installed/x64-windows/bin"
    - $ErrorActionPreference = "Stop"

# Cache Global
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - build/vcpkg_installed/

# Stage : Code Lint 
code-lint-job:
  stage: Lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script: 
    - $files = Get-ChildItem -Path "$CI_PROJECT_DIR/backend/src","$CI_PROJECT_DIR/backend/include" -Recurse | Where-Object { $_.Extension -match '\.(h|cpp)$' } | Select-Object -ExpandProperty FullName
    - clang-format --style=file --dry-run -Werror  $files

# Stage: Build
build-job:
  stage: build
  script:
    -  cmake -B build -DVCPKG_TARGET_TRIPLET=x64-windows-static -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="C:/Users/joaom/Desktop/vcpkg/scripts/buildsystems/vcpkg.cmake" -DCMAKE_MSVC_RUNTIME_LIBRARY="MultiThreaded"
    - cmake --build build --config Release
  artifacts:
    name: "build-binaries-$CI_COMMIT_REF_SLUG"
    paths:
      - build/backend/Release/
      - build/backend/tests/Release/
      - build/frontend/src/Release/

      - build/vcpkg_installed/x64-windows/bin/
    expire_in: 14 days

# Stage: Test
unit-test-job:
  stage: unit-test
  dependencies:
    - build-job
  script:
    - build/backend/tests/Release/client_test.exe

coverage-job:
  stage: coverage
  dependencies:
    - build-job
  script:
    - cd .\backend\coverage
    - python .\Coverage_Verifier.py

# Stage: Deploy
submit-backend-executable-job:
  stage: submit-backend-executable
  environment: production
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
  script:
    - echo "Movendo arquivos para pasta fixa..."
    - New-Item -Path "$env:PATH_DEPLOY_BACKEND" -ItemType Directory -Force
    - Move-Item -Path "$CI_PROJECT_DIR/build/backend/Release/backend.exe" -Destination "$env:PATH_DEPLOY_BACKEND" -Force
  needs:
    - build-job
    - unit-test-job
    - coverage-job
