# Pipeline Stages
stages:
  - Lint
  - build
  - unit-test
  - coverage
  - deploy

# Jobs Configuration
default:
  tags:
    - windows 

# Cache Global
cache:
  key: "$CI_COMMIT_REF_SLUG"

  paths:
    - vcpkg_installed/

# Stage : Code Lint 
code-lint-job:
  stage: Lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  script: 
    - $files = Get-ChildItem -Path "$CI_PROJECT_DIR/src","$CI_PROJECT_DIR/include" -Recurse | Where-Object { $_.Extension -match '\.(h|cpp)$' } | Select-Object -ExpandProperty FullName
    - clang-format --style=file --dry-run -Werror  $files

# Stage: Build
build-job:
  stage: build
  script:
    - cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$VCPKG_FOLDER/scripts/buildsystems/vcpkg.cmake"
    - cmake --build build --config Release
  artifacts:
    name: "build-binaries-$CI_COMMIT_REF_SLUG"
    paths:
      - build/tests/Release/client_test.exe
      - build/Release/grpc.exe
      - build/src/ui/Release/wxHelloWorld.exe
    expire_in: 1 day

# Stage: Test
unit-test-job:
  stage: unit-test
  dependencies:
    - build-job
  script:
    - $server = Join-Path $PWD "build/Release/grpc.exe"
    
    - $proc = Start-Process -FilePath $server -PassThru -WindowStyle Hidden
    - Start-Sleep -Seconds 5

    - echo "Executando testes..."

    - build/tests/Release/client_test.exe

    - |
      if ($proc -and !$proc.HasExited) {
        Stop-Process -Id $proc.Id -Force
      }

coverage-job:
  stage: coverage
  dependencies:
    - build-job
  script:
    - $server = Join-Path $PWD "build/Release/grpc.exe"
    
    - $proc = Start-Process -FilePath $server -PassThru -WindowStyle Hidden
    - Start-Sleep -Seconds 5

    - OpenCppCoverage --sources "$CI_PROJECT_DIR/src" `
      --export_type cobertura:"$CI_PROJECT_DIR/coverage.xml" `
      -- "$CI_PROJECT_DIR/build/tests/Debug/client_test.exe"
    
    - |
      if ($proc -and !$proc.HasExited) {
        Stop-Process -Id $proc.Id -Force
      }
    - python ./coverage/Coverage_Verifier.py

# Stage: Deploy 
deploy-job:
  stage: deploy
  environment: production
  rules:
    - if: $CI_COMMIT_BRANCH == 'main'
  script:
  needs:
    - build-job
  artifacts:
    name: "Release-Package-$CI_COMMIT_SHORT_SHA"
    paths:
      - build/Release/grpc.exe
      - build/Release/*.dll

      - build/src/ui/Release/wxHelloWorld.exe
      - build/src/ui/Release/*.dll
    expire_in: 30 days
